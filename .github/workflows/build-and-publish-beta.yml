name: Build & Publish Beta

on:
    push:
        branches:
            - master    
        paths:
            - '.github/**'
            - 'MyraTexturePacker/**'
            - 'MyraTexturePacker.Tests/**'
    workflow_dispatch:

on:
  workflow_dispatch:

jobs:
  BuildAndPublish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0.x'
    - name: Build MyraTexturePacker
      run: dotnet build MyraTexturePacker.sln --configuration Release
    - name: Build MyraTexturePacker
      run: dotnet test MyraTexturePacker.sln